<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas - Vue 3</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script src="app.js" defer></script>
    
    <style>
       body {
        font-family: "Gill Sans";
        background: #cdcdcd;
        padding: 16px;
       }

       h1 {
        color: rgb(0, 173, 173);
        text-align: center;
       }

       .input-area {
        text-align: center;
        margin-bottom: 20px;
       }

       #tarefaInput {
        padding: 8px;
        width: 160px;
        border-radius: 8px;
       }

       #btnAdicionar{
        padding: 8px 12px;
        margin-left: 5px;
        background-color: rgb(0, 173, 173);
        color: white;
        border: #16c416 0px solid;
        border-radius: 8px;
        cursor: pointer;
       }

       #btnAdicionar:hover {
        background-color: white;
        color: rgb(0, 173, 173);
        transition: 0.5s;
       }

       ul {
        padding: 0px;
       }

       li {
        background: #fff;
        margin: 16px 16px;
        padding: 10px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-content: center;
        cursor: pointer;
       }

       .fechar{
        background-color: darkred;
        color: white;
        border-radius: 100px;
        border: none;
        cursor: pointer;
       }
       
       li.concluida {
        text-decoration: line-through;
        color: gray;
       }
    </style>
</head>
<body>

    <div id="app">
        <h1>Tarefas</h1>
        
        <div class="input-area">
            <input type="text" id="tarefaInput" placeholder="Digite sua Tarefa!" v-model="novaTarefa" @keyup.enter="adicionarTarefa">
            <button id="btnAdicionar" @click="adicionarTarefa">+</button>
        </div>

        <ul id="listaTarefas">
            <li 
                v-for="(tarefa, index) in tarefas" 
                :key="index" 
                :class="{ concluida: tarefa.concluida }"
                @click="toggleConcluida(tarefa)"
            >
                {{ tarefa.texto }}
                <button class="fechar" @click.stop="removerTarefa(index)">x</button>
            </li>
        </ul>
    </div>
    
</body>
</html>
